name: Fuzz

# Fuzz the versioned-restore decode path on every pull request (the one place
# untrusted bytes enter). A crash is a real, reproducible bug, so this job blocks
# and uploads the crashing input. Invokes the same `make` target a developer runs
# locally.
#
# Mutation testing is a separate, manual workflow: mutants.yml (workflow_dispatch).

on:
  pull_request:

permissions:
  contents: read

jobs:
  fuzz:
    name: fuzz (restore)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned action; nightly set below
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
      - uses: taiki-e/install-action@8b3c737da4b541bf0fb5a3e0488ff20535badac9 # v2
        with:
          tool: cargo-fuzz
      # Persist the corpus so each run probes deeper than a cold start.
      - name: Restore fuzz corpus
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: app/crates/ironstate/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - run: make fuzz
        env:
          FUZZ_SECONDS: "180"
          FUZZ_TARGET: x86_64-unknown-linux-gnu # gnu host: the prebuilt cargo-fuzz otherwise targets musl
      # Fuzzing is non-deterministic: a crash found one run may not resurface the
      # next. So on a crash, fold the reproducer into the corpus — libFuzzer
      # replays the whole corpus at startup, so it re-crashes deterministically
      # every run until the bug is fixed (a red can't silently flip green). Turn
      # the uploaded input into a regression test for a permanent, fuzzer-free gate.
      - name: Preserve crash reproducer in the corpus
        if: failure()
        run: |
          mkdir -p app/crates/ironstate/fuzz/corpus/restore
          cp -f app/crates/ironstate/fuzz/artifacts/restore/* \
                app/crates/ironstate/fuzz/corpus/restore/ 2>/dev/null || true
      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: fuzz-crash
          path: app/crates/ironstate/fuzz/artifacts
          if-no-files-found: ignore
      # Save even on failure, so a freshly-folded-in crash persists for replay.
      - name: Save fuzz corpus
        if: always()
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: app/crates/ironstate/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
