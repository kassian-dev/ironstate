name: Mutants

# Mutation-test the changed Rust with cargo-mutants --in-diff. Manual only:
# run it from the Actions tab, or `gh workflow run mutants.yml -f base=<branch>`,
# when changing core logic. Advisory — results go to the run summary, nothing
# blocks. Kept off pull_request on purpose: on most PRs (docs, deps, test-only,
# assertion-heavy helpers) it has little to mutate, so it ran for no signal.
on:
  workflow_dispatch:
    inputs:
      base:
        description: "Branch (or ref) to diff against for --in-diff"
        required: false
        default: main

permissions:
  contents: read

jobs:
  mutants:
    name: mutants (manual)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # need history to diff against the base
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: app
      - uses: taiki-e/install-action@16b05812d776ae1dfaabc8277e421fb6d2506419 # v2
        with:
          tool: cargo-mutants
      - name: Diff of changed Rust (paths relative to app/)
        id: diff
        # Diff against the chosen branch (default main). The value comes through
        # env, not interpolated straight into the script.
        env:
          INPUT_BASE: ${{ inputs.base }}
        run: |
          base="${INPUT_BASE:-main}"
          # Accept a SHA / tag / fully-qualified ref as-is; fall back to a remote
          # branch (origin/<name>) for a plain branch name.
          if git rev-parse --verify --quiet "$base^{commit}" >/dev/null; then
            ref="$base"
          elif git rev-parse --verify --quiet "origin/$base^{commit}" >/dev/null; then
            ref="origin/$base"
          else
            echo "::error::mutants base ref '$base' not found"; exit 1
          fi
          git diff --relative=app "$ref"...HEAD -- '*.rs' > "$RUNNER_TEMP/changed.diff"
          echo "lines=$(wc -l < "$RUNNER_TEMP/changed.diff" | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: Mutation-test the diff
        if: steps.diff.outputs.lines != '0'
        continue-on-error: true # advisory: surviving mutants must not fail the run
        timeout-minutes: 15 # bound the run; a huge diff reports partial results
        # Generous per-mutant timeout: the seeded suite runs in seconds, so a
        # finite mutant finishes well under this — only a true hang times out.
        # This keeps results reproducible (a survivor drops off only when the
        # code/tests actually changed, not from build timing).
        run: make mutants MUTANTS_ARGS="--in-diff $RUNNER_TEMP/changed.diff --timeout 120"
      - name: Report surviving mutants
        if: steps.diff.outputs.lines != '0'
        run: bash .github/report-mutants.sh
