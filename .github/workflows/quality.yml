name: Quality

# Deeper, time-boxed checks on every pull request:
#  - fuzz the versioned-restore decode path (the one place untrusted bytes enter);
#    a crash is a real, reproducible bug, so this job blocks and uploads the
#    crashing input.
#  - mutation-test the changed Rust with cargo-mutants `--in-diff`; advisory only,
#    it reports surviving mutants in a sticky PR comment but never blocks.
# Jobs invoke the same `make` targets a developer runs locally.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # mutants: sticky PR comment

jobs:
  fuzz:
    name: fuzz (restore)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # pinned action; nightly set below
        with:
          toolchain: nightly
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-fuzz
      # Persist the corpus so each run probes deeper than a cold start.
      - name: Restore fuzz corpus
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: app/crates/ironstate/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}
          restore-keys: fuzz-corpus-
      - run: make fuzz
        env:
          FUZZ_SECONDS: "180"
          FUZZ_TARGET: x86_64-unknown-linux-gnu # gnu host: the prebuilt cargo-fuzz otherwise targets musl
      # Fuzzing is non-deterministic: a crash found one run may not resurface the
      # next. So on a crash, fold the reproducer into the corpus — libFuzzer
      # replays the whole corpus at startup, so it re-crashes deterministically
      # every run until the bug is fixed (a red can't silently flip green). Turn
      # the uploaded input into a regression test for a permanent, fuzzer-free gate.
      - name: Preserve crash reproducer in the corpus
        if: failure()
        run: |
          mkdir -p app/crates/ironstate/fuzz/corpus/restore
          cp -f app/crates/ironstate/fuzz/artifacts/restore/* \
                app/crates/ironstate/fuzz/corpus/restore/ 2>/dev/null || true
      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fuzz-crash
          path: app/crates/ironstate/fuzz/artifacts
          if-no-files-found: ignore
      # Save even on failure, so a freshly-folded-in crash persists for replay.
      - name: Save fuzz corpus
        if: always()
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: app/crates/ironstate/fuzz/corpus
          key: fuzz-corpus-${{ github.run_id }}

  mutants:
    name: mutants (advisory)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # need the PR base commit to diff against
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: app
      - uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2
        with:
          tool: cargo-mutants
      - name: Diff of changed Rust (paths relative to app/)
        id: diff
        run: |
          base='${{ github.event.pull_request.base.sha }}'
          git diff --relative=app "$base"...HEAD -- '*.rs' > "$RUNNER_TEMP/changed.diff" || true
          echo "lines=$(wc -l < "$RUNNER_TEMP/changed.diff" | tr -d ' ')" >> "$GITHUB_OUTPUT"
      - name: Mutation-test the diff
        if: steps.diff.outputs.lines != '0'
        continue-on-error: true # advisory: surviving mutants must not fail the build
        timeout-minutes: 15 # bound the run; a huge diff (e.g. the bootstrap PR) reports partial results
        # Generous per-mutant timeout: the seeded suite runs in seconds, so a
        # finite mutant finishes well under this — only a true hang times out.
        # This keeps results deterministic (a survivor drops off only when the
        # code/tests actually changed, not from timing), so the comment doesn't
        # falsely flip to "clean".
        run: make mutants MUTANTS_ARGS="--in-diff $RUNNER_TEMP/changed.diff --timeout 120"
      - name: Report surviving mutants
        if: steps.diff.outputs.lines != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash .github/report-mutants.sh
