name: Release

# Publishing runs automatically when a release PR lands on main. A maintainer
# dispatches the companion "Release PR" workflow (release-pr.yml) to open or
# refresh the version-bump/changelog PR; merging that PR is a push to main by a
# human (not GITHUB_TOKEN, so it does trigger workflows), which fires this job.
# The `release` command is idempotent — it publishes only crates whose
# Cargo.toml version is ahead of crates.io, so ordinary merges with no version
# bump are a no-op and nothing ships until a release PR merges. When it does
# publish, it does so in dependency order and pushes a tag per release.
#
# Assumes the crates are already bootstrapped — published once and registered as
# trusted publishers (a one-time setup, not CI's job).
#
# Security: Trusted Publishing via OIDC (no long-lived CARGO_REGISTRY_TOKEN),
# SLSA build-provenance attestations signed through Sigstore, and SHA-pinned
# actions.

on:
  push:
    branches:
      - main

permissions:
  contents: write # create release commits, tags, and GitHub releases
  id-token: write # OIDC exchange for crates.io Trusted Publishing
  attestations: write # build-provenance attestations

jobs:
  release:
    name: release
    runs-on: ubuntu-24.04
    # Guard so forks never publish; only the canonical repo releases.
    if: ${{ github.repository_owner == 'kassian-dev' }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # release-plz needs full history to detect changes

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      # Exchange the workflow's OIDC identity for a short-lived crates.io token.
      - name: Authenticate to crates.io (Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1
        id: auth

      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5
        with:
          command: release
          # The Cargo workspace lives under app/.
          manifest_path: app/Cargo.toml
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Attest provenance for any crates this run packaged (SLSA, via Sigstore).
      - name: Attest build provenance
        if: ${{ hashFiles('app/target/package/*.crate') != '' }}
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: app/target/package/*.crate
