# cargo-deny configuration. Supply chain is a blocking CI gate: every dependency
# is a liability with a changelog, so licenses, advisories, and duplicate majors
# are all checked before a build is allowed to go green.

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
# The family is Apache-2.0; dependencies must carry OSI-approved permissive licenses.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Unicode-3.0",
    "ISC",
    "Zlib",
]
confidence-threshold = 0.9

[bans]
# Duplicate major versions bloat the tree and split trait impls; surface them for review.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
